<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<body>
    
    <input id="a" type="number" placeholder="Primeiro número">
    <input id="b" type="number" placeholder="Segundo número">

    <button onclick="calc('+')">+</button>
    <button onclick="calc('-')">-</button>
    <button onclick="calc('*')">*</button>
    <button onclick="calc('/')">/</button>

    <p id="res"></p>

    <script src="../calculadora.js"></script>

</body>
</html>
